name: CI - Code Quality & Validation

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # Lint Server
  lint-server:
    runs-on: ubuntu-latest
    name: Lint Server Code
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./server
        run: npm install
      - name: Run ESLint
        working-directory: ./server
        run: npm run lint

  # Lint Client
  lint-client:
    runs-on: ubuntu-latest
    name: Lint Client Code
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./client
        run: npm install
      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

  # Syntax Check Server
  syntax-check-server:
    runs-on: ubuntu-latest
    name: Syntax Check - Server
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Check Server Syntax
        working-directory: ./server
        run: |
          echo "🔍 Checking JavaScript syntax..."
          node -c index.js
          echo "✅ Server syntax valid"

  # Unit Tests Server
  test-server:
    runs-on: ubuntu-latest
    name: Unit Tests - Server
    needs: [lint-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./server
        run: npm install
      - name: Run Tests
        working-directory: ./server
        env:
          MONGODB: ${{ secrets.MONGODB }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          PORT: 5000
        run: npm test

  # SonarQube Analysis
  sonarqube:
    runs-on: ubuntu-latest
    name: SonarQube Code Analysis
    needs: [test-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # needed for SonarQube blame info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=mansourmaher
            -Dsonar.projectKey=mansourmaher_Student-attandance-management
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # Build Validation Server
  build-server:
    runs-on: ubuntu-latest
    name: Build Validation - Server
    needs: [lint-server, syntax-check-server, test-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./server
        run: npm install
      - name: Verify dependencies
        working-directory: ./server
        run: npm ls --depth=0
      - name: Check for security vulnerabilities
        working-directory: ./server
        run: npm audit --audit-level=moderate || true

  # Build Validation Client
  build-client:
    runs-on: ubuntu-latest
    name: Build Validation - Client
    needs: [lint-client]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./client
        run: npm install
      - name: Build application
        working-directory: ./client
        run: npm run build
      - name: Check for security vulnerabilities
        working-directory: ./client
        run: npm audit --audit-level=moderate || true

  # Build Docker Images
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [build-server, build-client, sonarqube]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Server Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: false
          tags: ${{ secrets.DOCKER_USER_NAME }}/mern-server:latest
          load: true

      - name: Build Client Image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: false
          tags: ${{ secrets.DOCKER_USER_NAME }}/mern-client:latest
          load: true

      # 🔒 Trivy scan server image
      - name: Trivy Scan - Server Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER_NAME }}/mern-server:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      # 🔒 Trivy scan client image
      - name: Trivy Scan - Client Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER_NAME }}/mern-client:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      # Push only after scans pass
      - name: Push Server Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USER_NAME }}/mern-server:latest
            ${{ secrets.DOCKER_USER_NAME }}/mern-server:${{ github.sha }}

      - name: Push Client Image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USER_NAME }}/mern-client:latest
            ${{ secrets.DOCKER_USER_NAME }}/mern-client:${{ github.sha }}

  # Summary
  ci-summary:
    runs-on: ubuntu-latest
    name: CI Pipeline Summary
    needs: [lint-server, lint-client, syntax-check-server, test-server, sonarqube, build-server, build-client, build-docker]
    if: always()
    steps:
      - name: Check if all jobs passed
        run: |
          if [ "${{ needs.lint-server.result }}" = "failure" ] || \
             [ "${{ needs.lint-client.result }}" = "failure" ] || \
             [ "${{ needs.syntax-check-server.result }}" = "failure" ] || \
             [ "${{ needs.test-server.result }}" = "failure" ] || \
             [ "${{ needs.sonarqube.result }}" = "failure" ] || \
             [ "${{ needs.build-server.result }}" = "failure" ] || \
             [ "${{ needs.build-client.result }}" = "failure" ] || \
             [ "${{ needs.build-docker.result }}" = "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed - All checks successful"
          echo "🚀 Ready for deployment"