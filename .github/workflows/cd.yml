name: CD - Build & Deploy

on:
  push:
    branches: ["main"]

jobs:
  # Verify CI passed
  check-ci:
    runs-on: ubuntu-latest
    name: Wait for CI Pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Wait for CI workflow
        run: |
          echo "⏳ Waiting for CI pipeline to complete..."
          echo "CI checks must pass before deployment can proceed"

  # Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push Docker Images
    needs: check-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Server Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USER_NAME }}/mern-server:latest
            ${{ secrets.DOCKER_USER_NAME }}/mern-server:${{ github.sha }}

      - name: Build and push Client Image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USER_NAME }}/mern-client:latest
            ${{ secrets.DOCKER_USER_NAME }}/mern-client:${{ github.sha }}

  # Deploy notification
  deploy-success:
    runs-on: ubuntu-latest
    name: Deployment Success
    needs: build-and-push
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log Deployment Info
        run: |
          echo "✅ CD Pipeline Completed Successfully!"
          echo ""
          echo "📦 Docker Images Pushed:"
          echo "  - Server: ${{ secrets.DOCKER_USER_NAME }}/mern-server:latest"
          echo "  - Client: ${{ secrets.DOCKER_USER_NAME }}/mern-client:latest"
          echo ""
          echo "🚀 Render auto-deployment triggered"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"

  # Deployment failure
  deploy-failure:
    runs-on: ubuntu-latest
    name: Deployment Failed
    needs: build-and-push
    if: failure()

    steps:
      - name: Notify Failure
        run: |
          echo "❌ CD Pipeline Failed"
          echo "Build and push failed. Check logs above."
          exit 1
