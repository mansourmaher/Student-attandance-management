# This workflow has been split into separate CI and CD pipelines
# 
# CI Pipeline: ci.yml
#   - Runs on: push and pull_request
#   - Checks: Linting, syntax errors, build validation
#   - Must pass before CD can proceed
#
# CD Pipeline: cd.yml
#   - Runs on: push to main (only after CI passes)
#   - Actions: Build Docker images, push to Docker Hub
#   - Deploy: Render auto-deploys on image push
#
# See ci.yml and cd.yml for detailed pipeline configurations

